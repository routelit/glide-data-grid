site_name: routelit-glide-data-grid
repo_url: https://github.com/rolangom/routelit-glide-data-grid
site_url: https://rolangom.github.io/routelit-glide-data-grid
site_description: This is a routelit library repository for that uses uv for their dependency management.
site_author: Rolando Gomez Tabar
edit_uri: edit/main/docs/
repo_name: rolangom/routelit-glide-data-grid
copyright: Maintained by <a href="https://rolangom.com">rolangom</a>.
docs_dir: docs

nav:
  - Home: index.md
  - Examples: examples.md
  - Modules: modules.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [
            "src/routelit_glide_data_grid"
            ]
theme:
  name: material
  feature:
    tabs: true
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rolangom/routelit-glide-data-grid
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/routelit-glide-data-grid

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
